<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Picko</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2ede8;
  --surface:#faf7f4;
  --surface2:#ede8e2;
  --border:#d8d0c8;
  --accent:#8a6f5e;
  --accent-dark:#6b5347;
  --text:#2c2418;
  --text-dim:#9a8878;
  --user-bubble:#c2b099;
  --pos:#2d7a3e;
  --neg:#c0392b;
  --selected:#c2b099;
  --max-width:720px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);
  color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;
}

/* ── 시작 페이지 ── */
#start-page{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;padding:20px;transition:opacity 0.4s ease;
}
#start-page.hidden{opacity:0;pointer-events:none;}
.start-logo{font-size:40px;margin-bottom:6px;}
.start-title{font-size:28px;font-weight:700;color:var(--text);margin-bottom:6px;}
.start-sub{font-size:13px;color:var(--text-dim);margin-bottom:36px;}
.start-input-wrap{
  width:100%;max-width:var(--max-width);background:var(--surface);
  border:1.5px solid var(--border);border-radius:16px;padding:14px 18px;
  display:flex;flex-direction:column;gap:12px;
  box-shadow:0 2px 16px rgba(0,0,0,0.05);transition:border-color 0.2s;
}
.start-input-wrap:focus-within{border-color:var(--accent);}
#start-input{
  width:100%;background:transparent;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);
  min-height:28px;resize:none;line-height:1.5;
}
#start-input::placeholder{color:var(--text-dim);}
.start-input-footer{display:flex;align-items:center;justify-content:space-between;}
.start-send-btn{
  width:34px;height:34px;background:var(--selected);border:none;
  border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity 0.15s;
}
.start-send-btn:hover{opacity:0.85;}
.start-send-btn svg{width:14px;height:14px;fill:white;}
.start-chips{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  margin-top:20px;max-width:var(--max-width);
}
.start-chip{
  padding:7px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;font-size:13px;color:var(--text-dim);cursor:pointer;
  transition:all 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.start-chip:hover{border-color:var(--accent);color:var(--accent);}

/* ── 채팅 페이지 ── */
#chat-page{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 0.4s ease;}
#chat-page.visible{opacity:1;}

/* 헤더 */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 0;padding-top:calc(10px + env(safe-area-inset-top));flex-shrink:0;
}
.header-inner{
  max-width:var(--max-width);margin:0 auto;padding:0 20px;
  display:flex;align-items:center;gap:10px;
}
.logo-wrap{display:flex;align-items:center;gap:8px;}
.logo-emoji{font-size:22px;}
.header-info h1{font-size:15px;font-weight:700;color:var(--text);}
.header-info p{font-size:11px;color:var(--text-dim);}
.status{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);}
.dot{width:6px;height:6px;border-radius:50%;background:#2d7a3e;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* 채팅 영역 */
#chat{
  flex:1;overflow-y:auto;padding:20px 0;
  background:var(--bg);scroll-behavior:smooth;
  display:flex;flex-direction:column;gap:14px;
}
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* 메시지 - max-width 센터 정렬 */
.msg-wrap{width:100%;display:flex;justify-content:center;}
.msg-inner{width:100%;max-width:var(--max-width);padding:0 20px;display:flex;gap:8px;}
.msg-inner.user{flex-direction:row-reverse;}
.msg-inner.full{align-items:flex-start;}

.msg{animation:up 0.25s ease;}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.av{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.av-ai{background:var(--surface);border:1px solid var(--border);font-size:16px;}
.av-user{background:var(--user-bubble);color:white;font-family:'DM Mono',monospace;font-size:11px;}

.bubble{
  padding:10px 14px;border-radius:14px;font-size:14px;
  line-height:1.65;word-break:break-word;white-space:pre-wrap;max-width:85%;
}
.bubble-ai{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px;color:var(--text);}
.bubble-user{background:var(--user-bubble);color:white;border-top-right-radius:3px;}

/* 상황판 */
.board{background:var(--surface2);border:1px solid var(--border);border-radius:14px;border-top-left-radius:3px;padding:18px;width:100%;}
.board-title{font-size:12px;color:var(--text-dim);margin-bottom:14px;font-weight:500;display:flex;align-items:center;gap:6px;}
.board-title::before{content:'▶';font-size:10px;}
.board-row{display:flex;gap:8px;margin-bottom:12px;align-items:flex-start;flex-wrap:wrap;}
.board-label{font-size:13px;color:var(--text-dim);font-weight:500;min-width:100px;flex-shrink:0;padding-top:5px;}
.board-label.label-e{font-size:14px;font-weight:700;color:var(--text);}
.board-options{display:flex;gap:6px;flex-wrap:wrap;}
.opt-btn{
  padding:6px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;font-size:13px;color:var(--text-dim);cursor:pointer;transition:all 0.15s;
}
.opt-btn:hover{border-color:var(--accent);color:var(--text);}
.opt-btn.selected{background:var(--selected);border-color:var(--selected);color:white;font-weight:600;}
.board-direct{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;
  font-family:'DM Sans',sans-serif;outline:none;
}
.board-direct:focus{border-color:var(--accent);}
.board-help{font-size:12px;color:var(--accent);margin-top:10px;font-weight:500;}
.board-confirm{
  margin-top:16px;padding:8px 24px;background:var(--selected);color:white;
  border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s;
}
.board-confirm:hover{opacity:0.85;}

/* 확인 버튼 */
.confirm-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:14px;border-top-left-radius:3px;padding:16px;width:100%;}
.confirm-text{font-size:14px;line-height:1.75;margin-bottom:14px;white-space:pre-wrap;color:var(--text);}
.confirm-btns{display:flex;gap:8px;flex-wrap:wrap;}
.confirm-btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
.btn-yes{background:var(--selected);color:white;}
.btn-yes:hover{opacity:0.85;}
.btn-add{background:var(--surface);border:1.5px solid var(--selected);color:var(--selected);}
.btn-add:hover{background:var(--selected);color:white;}
.btn-no{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);}
.btn-no:hover{border-color:var(--neg);color:var(--neg);}

/* 제품 카드 */
.products-wrap{width:100%;display:flex;flex-direction:column;gap:10px;}
.products-title{font-size:13px;color:var(--accent);padding:4px 0;font-weight:600;}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;gap:14px;transition:border-color 0.15s;}
.product-card:hover{border-color:var(--accent);}
.product-img{width:80px;height:80px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:32px;}
.product-info{flex:1;min-width:0;}
.product-store{font-size:11px;color:var(--accent);margin-bottom:4px;}
.product-name{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.4;color:var(--text);}
.product-price{font-size:18px;font-weight:700;color:var(--selected);margin-bottom:8px;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-pos{background:rgba(45,122,62,0.1);color:var(--pos);border:1px solid rgba(45,122,62,0.2);}
.badge-neg{background:rgba(192,57,43,0.1);color:var(--neg);border:1px solid rgba(192,57,43,0.2);}
.badge-score{background:rgba(138,111,94,0.1);color:var(--selected);border:1px solid rgba(138,111,94,0.2);}
.btn-view{display:inline-block;padding:6px 14px;background:var(--selected);color:white;border-radius:20px;font-size:12px;font-weight:600;text-decoration:none;}

/* 마이크 파동 애니메이션 */
#micModal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
#micModal.active{display:flex;}
.mic-wave{display:flex;align-items:center;gap:4px;height:40px;}
.mic-wave span{
  display:inline-block;width:4px;background:white;border-radius:4px;
  animation:wave 1s ease-in-out infinite;
}
.mic-wave span:nth-child(1){animation-delay:0s;height:10px;}
.mic-wave span:nth-child(2){animation-delay:0.1s;height:20px;}
.mic-wave span:nth-child(3){animation-delay:0.2s;height:30px;}
.mic-wave span:nth-child(4){animation-delay:0.3s;height:20px;}
.mic-wave span:nth-child(5){animation-delay:0.4s;height:10px;}
@keyframes wave{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1.5)}}
.mic-text{color:white;font-size:14px;font-weight:500;}
.mic-interim{color:rgba(255,255,255,0.8);font-size:13px;min-height:20px;}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text-dim);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* 입력창 - 하단 고정 */
.input-area{
  background:var(--surface);border-top:1px solid var(--border);
  padding:12px 0;flex-shrink:0;
}
.input-inner{
  max-width:var(--max-width);margin:0 auto;padding:0 20px;
  display:flex;gap:8px;align-items:flex-end;
}
.input-wrap{
  flex:1;display:flex;align-items:center;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:12px;padding:8px 14px;transition:border-color 0.2s;
}
.input-wrap:focus-within{border-color:var(--accent);}
#input{
  flex:1;background:transparent;border:none;outline:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;resize:none;
  line-height:1.5;max-height:120px;min-height:22px;overflow-y:auto;
}
#input::placeholder{color:var(--text-dim);}
#sendBtn{
  width:36px;height:36px;background:var(--selected);border:none;border-radius:10px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity 0.15s;
}
#sendBtn:hover{opacity:0.85;}
#sendBtn:disabled{opacity:0.3;cursor:not-allowed;}
#sendBtn svg{width:14px;height:14px;fill:white;}
#micBtn{
  width:36px;height:36px;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.15s;
}
#micBtn:hover{border-color:var(--accent-dark);}
#micBtn.recording{background:var(--neg);border-color:var(--neg);animation:pulse 1s infinite;}
#micBtn svg{width:14px;height:14px;fill:var(--text-dim);}
#micBtn.recording svg{fill:white;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
</style>
</head>
<body>

<!-- 마이크 파동 모달 -->
<div id="micModal">
  <div class="mic-wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="mic-text">🎤 말씀해주세요...</div>
  <div class="mic-interim" id="micInterim"></div>
</div>

<!-- 시작 페이지 -->
<div id="start-page">
  <div class="start-logo">🛍️</div>
  <h1 class="start-title">Picko</h1>
  <p class="start-sub">리뷰 역추적으로 최적의 제품을 찾아드려요</p>
  <div class="start-input-wrap">
    <textarea id="start-input" placeholder="찾으시는 제품을 입력해주세요..." rows="1"></textarea>
    <div class="start-input-footer">
      <span style="font-size:12px;color:var(--text-dim);">AI Review Reverse Engine</span>
      <div style="display:flex;gap:6px;">
        <button id="startMicBtn" onclick="toggleStartVoice()" style="width:34px;height:34px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:var(--text-dim);"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 19.93c-3.95-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.05 7.44-7 7.93V23h-2v-2.07z"/></svg>
        </button>
        <button class="start-send-btn" onclick="startChat()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="start-chips">
    <div class="start-chip" onclick="startWithChip('아기 독서대 찾아요')">📚 아기 독서대</div>
    <div class="start-chip" onclick="startWithChip('여행용 가방 찾아요')">👜 여행용 가방</div>
    <div class="start-chip" onclick="startWithChip('발열 없는 노트북')">💻 발열 없는 노트북</div>
    <div class="start-chip" onclick="startWithChip('아기 카시트 찾아요')">🚗 아기 카시트</div>
    <div class="start-chip" onclick="startWithChip('baby book stand')">🇺🇸 baby book stand</div>
  </div>
</div>

<!-- 채팅 페이지 -->
<div id="chat-page">
  <header>
    <div class="header-inner">
      <div class="logo-wrap">
        <span class="logo-emoji">🛍️</span>
        <div class="header-info">
          <h1>Picko</h1>
          <p>AI Review Reverse Engine</p>
        </div>
      </div>
      <div class="status"><div class="dot"></div><span id="versionTag">live</span></div>
    </div>
  </header>

  <div id="chat"></div>

  <div class="input-area">
    <div class="input-inner">
      <div class="input-wrap">
        <textarea id="input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      </div>
      <button id="micBtn" onclick="toggleVoice()">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 19.93c-3.95-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.05 7.44-7 7.93V23h-2v-2.07z"/></svg>
      </button>
      <button id="sendBtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// 버전 자동 표시
fetch('/version').then(r=>r.json()).then(d=>{
  document.getElementById('versionTag').textContent = d.version + ' live';
}).catch(()=>{});

const chatPage   = document.getElementById('chat-page');
const startPage  = document.getElementById('start-page');
const chat       = document.getElementById('chat');
const input      = document.getElementById('input');
const sendBtn    = document.getElementById('sendBtn');
const startInput = document.getElementById('start-input');
let session = null;
const EMOJIS = ['🥇','🥈','🥉','4️⃣','5️⃣'];

function toggleStartVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Chrome 브라우저를 사용해주세요!');
    return;
  }
  const btn = document.getElementById('startMicBtn');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SpeechRecognition();
  rec.lang = 'ko-KR';
  rec.continuous = false;
  rec.interimResults = false;
  rec.onstart = () => {
    btn.style.background = '#c0392b';
    btn.style.borderColor = '#c0392b';
    startInput.placeholder = '🎤 말씀해주세요...';
  };
  rec.onresult = (e) => {
    startInput.value = e.results[0][0].transcript;
  };
  rec.onend = () => {
    btn.style.background = '';
    btn.style.borderColor = '';
    startInput.placeholder = '찾으시는 제품을 입력해주세요...';
    if (startInput.value.trim()) startChat();
  };
  rec.start();
}

startInput.addEventListener('input', () => {
  startInput.style.height = 'auto';
  startInput.style.height = Math.min(startInput.scrollHeight, 120) + 'px';
});
startInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startChat(); }
});

function showChatPage() {
  startPage.classList.add('hidden');
  chatPage.classList.add('visible');
  setTimeout(() => { startPage.style.display = 'none'; }, 400);
}
function startChat() {
  const text = startInput.value.trim();
  if (!text) return;
  showChatPage();
  setTimeout(() => send(text), 100);
}
function startWithChip(text) {
  showChatPage();
  setTimeout(() => send(text), 100);
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function scroll() { chat.scrollTop = chat.scrollHeight; }

function aiWrap(inner) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const mi = document.createElement('div');
  mi.className = 'msg-inner';
  mi.appendChild(inner);
  wrap.appendChild(mi);
  return wrap;
}

function addUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const mi = document.createElement('div');
  mi.className = 'msg-inner user';
  const av = document.createElement('div');
  av.className = 'av av-user';
  av.textContent = '나';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-user';
  bubble.textContent = text;
  mi.appendChild(av);
  mi.appendChild(bubble);
  wrap.appendChild(mi);
  chat.appendChild(wrap);
  scroll();
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap'; wrap.id = 'typing';
  const mi = document.createElement('div');
  mi.className = 'msg-inner';
  const av = document.createElement('div');
  av.className = 'av av-ai'; av.textContent = '🛍️';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-ai';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  mi.appendChild(av); mi.appendChild(bubble);
  wrap.appendChild(mi);
  chat.appendChild(wrap); scroll();
}

function isBoard(text) {
  return text.includes('[A ') && text.includes('[D ') && text.includes('[E 직접입력]');
}

function renderBoard(fullText) {
  const boardStart = fullText.indexOf('[A ');
  const empathy = boardStart > 0 ? fullText.substring(0, boardStart).trim() : '';
  const boardText = boardStart > 0 ? fullText.substring(boardStart) : fullText;

  if (empathy) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap';
    const mi = document.createElement('div');
    mi.className = 'msg-inner';
    const av = document.createElement('div');
    av.className = 'av av-ai'; av.textContent = '🛍️';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bubble-ai';
    bubble.textContent = empathy;
    mi.appendChild(av); mi.appendChild(bubble);
    wrap.appendChild(mi);
    chat.appendChild(wrap);
  }

  const lines = boardText.split('\n').filter(l => l.trim());
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const mi = document.createElement('div');
  mi.className = 'msg-inner full';
  const av = document.createElement('div');
  av.className = 'av av-ai'; av.textContent = '🛍️';
  const board = document.createElement('div');
  board.className = 'board';
  const title = document.createElement('div');
  title.className = 'board-title';
  title.textContent = '조건을 선택해주세요';
  board.appendChild(title);

  const selections = {};
  let directInput = null;

  lines.forEach(line => {
    const match = line.match(/\[([A-E][^\]]*)\]\s*(.*)/);
    if (!match) return;
    const label = match[1].trim();
    const content = match[2].trim();
    const key = label[0];
    const row = document.createElement('div');
    row.className = 'board-row';
    const lbl = document.createElement('div');
    lbl.className = key === 'E' ? 'board-label label-e' : 'board-label';
    lbl.textContent = `[${label}]`;
    row.appendChild(lbl);

    if (key === 'E') {
      const inp = document.createElement('input');
      inp.className = 'board-direct';
      inp.placeholder = '직접 입력하세요...';
      inp.type = 'text';
      directInput = inp;
      row.appendChild(inp);
      board.appendChild(row);
      const help = document.createElement('div');
      help.className = 'board-help';
      help.textContent = '✍️ 여기에 적어주신 한 마디가 더 정확한 제품을 찾는데 도움이 됩니다';
      board.appendChild(help);
    } else {
      const opts = document.createElement('div');
      opts.className = 'board-options';
      content.split('/').map(o => o.trim()).filter(Boolean).forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'opt-btn';
        btn.textContent = opt;
        btn.onclick = () => {
          opts.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selections[key] = opt;
        };
        opts.appendChild(btn);
      });
      row.appendChild(opts);
      board.appendChild(row);
    }
  });

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'board-confirm';
  confirmBtn.textContent = '선택 완료 →';
  confirmBtn.onclick = () => {
    const parts = [];
    ['A','B','C','D'].forEach(k => { if (selections[k]) parts.push(`${k}:${selections[k]}`); });
    if (directInput && directInput.value.trim()) parts.push(`E:${directInput.value.trim()}`);
    if (parts.length === 0) { alert('조건을 하나 이상 선택해주세요'); return; }
    send(parts.join(' '));
  };
  board.appendChild(confirmBtn);
  mi.appendChild(av); mi.appendChild(board);
  wrap.appendChild(mi);
  chat.appendChild(wrap);
}

function isConfirm(text) { return text.includes('CONFIRM_BUTTONS'); }

function renderConfirm(text) {
  const summaryText = text.replace('CONFIRM_BUTTONS', '').trim();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const mi = document.createElement('div');
  mi.className = 'msg-inner full';
  const av = document.createElement('div');
  av.className = 'av av-ai'; av.textContent = '🛍️';
  const box = document.createElement('div');
  box.className = 'confirm-wrap';
  const txt = document.createElement('div');
  txt.className = 'confirm-text';
  txt.textContent = summaryText;
  box.appendChild(txt);
  const btns = document.createElement('div');
  btns.className = 'confirm-btns';
  const yes = document.createElement('button');
  yes.className = 'confirm-btn btn-yes';
  yes.textContent = '네, 찾아주세요! 🔍';
  yes.onclick = () => send('네');
  const add = document.createElement('button');
  add.className = 'confirm-btn btn-add';
  add.textContent = '추가할게요 ✏️';
  add.onclick = () => send('추가');
  const no = document.createElement('button');
  no.className = 'confirm-btn btn-no';
  no.textContent = '다시 선택할게요';
  no.onclick = () => send('아니요');
  btns.appendChild(yes); btns.appendChild(add); btns.appendChild(no);
  box.appendChild(btns);
  mi.appendChild(av); mi.appendChild(box);
  wrap.appendChild(mi);
  return wrap;
}

function parseProducts(text) {
  const lines = text.split('\n');
  const products = [];
  let cur = null;
  for (const line of lines) {
    const tm = line.match(/^(\d+)\. (.+)/);
    if (tm) {
      if (cur) products.push(cur);
      cur = { rank:parseInt(tm[1]), title:tm[2].trim(), price:'', store:'', positive:'0', negative:'0', score:'0', link:'#' };
      continue;
    }
    if (!cur) continue;
    const price = line.match(/가격[:\s]+([0-9,원~]+)/);
    if (price) cur.price = price[1];
    const lnk = line.match(/[Ll]ink[:\s]+(.+)/);
    if (lnk) cur.link = lnk[1].trim();
  }
  if (cur) products.push(cur);
  return products;
}

function renderProducts(products) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const mi = document.createElement('div');
  mi.className = 'msg-inner full';
  const av = document.createElement('div');
  av.className = 'av av-ai'; av.textContent = '🛍️';
  const pw = document.createElement('div');
  pw.className = 'products-wrap';
  const title = document.createElement('div');
  title.className = 'products-title';
  title.textContent = '🏆 리뷰 역추적 Top 3';
  pw.appendChild(title);
  products.slice(0,3).forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    const imgBox = document.createElement('div');
    imgBox.className = 'product-img';
    imgBox.onclick = () => { if (p.link && p.link !== '#') window.open(p.link,'_blank'); };
    imgBox.textContent = EMOJIS[i]||'📦';
    const info = document.createElement('div');
    info.className = 'product-info';
    info.innerHTML = `
      <div class="product-store">${p.store||'추천'}</div>
      <div class="product-name">${p.title}</div>
      ${p.price ? `<div class="product-price">${p.price}</div>` : ''}
      <div class="badges">
        <span class="badge badge-pos">👍 ${p.positive}</span>
        <span class="badge badge-neg">👎 ${p.negative}</span>
        <span class="badge badge-score">⭐ ${p.score}</span>
      </div>
      <a href="${p.link||'#'}" target="_blank" class="btn-view">자세히 보기 →</a>
    `;
    card.appendChild(imgBox); card.appendChild(info);
    pw.appendChild(card);
  });
  mi.appendChild(av); mi.appendChild(pw);
  wrap.appendChild(mi);
  return wrap;
}

function addAiMsg(text) {
  if (isConfirm(text)) {
    chat.appendChild(renderConfirm(text));
  } else if (isBoard(text)) {
    renderBoard(text);
  } else {
    const prods = parseProducts(text);
    if (prods.length > 0 && text.match(/^\d+\./m)) {
      chat.appendChild(renderProducts(prods));
    } else {
      const wrap = document.createElement('div');
      wrap.className = 'msg-wrap';
      const mi = document.createElement('div');
      mi.className = 'msg-inner';
      const av = document.createElement('div');
      av.className = 'av av-ai'; av.textContent = '🛍️';
      const bubble = document.createElement('div');
      bubble.className = 'bubble bubble-ai';
      bubble.textContent = text;
      mi.appendChild(av); mi.appendChild(bubble);
      wrap.appendChild(mi);
      chat.appendChild(wrap);
    }
  }
  scroll();
}

// 음성 인식 (실시간 파동 + 텍스트)
let recognition = null;
let isRecording = false;

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('이 브라우저는 음성 인식을 지원하지 않아요. Chrome을 사용해주세요!');
    return;
  }
  if (isRecording) {
    recognition.stop();
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micModal').classList.add('active');
    document.getElementById('micInterim').textContent = '';
  };
  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('micInterim').textContent = final || interim;
    if (final) input.value = final;
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micModal').classList.remove('active');
    document.getElementById('micInterim').textContent = '';
    if (input.value.trim()) {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      send();
    }
  };
  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micModal').classList.remove('active');
  };
  recognition.start();
}

// 입력창 자동 높이 조절 (기존과 통합)

async function send(overrideText) {
  if (!msg) return;
  addUserMsg(msg);
  if (!overrideText) { input.value = ''; input.style.height = 'auto'; }
  sendBtn.disabled = true;
  addTyping();
  try {
    const res = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg, session: session })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();
    session = data.session;
    addAiMsg(data.response || '');
  } catch(e) {
    document.getElementById('typing')?.remove();
    addAiMsg('연결 오류가 발생했어요. 다시 시도해주세요.');
  }
  sendBtn.disabled = false;
  input.focus();
}
