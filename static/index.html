<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0eb; --surface:#fff; --surface2:#f0ebe4;
  --border:#e0d8cf; --accent:#e8722a; --accent2:#d4621a;
  --text:#2c2418; --text-dim:#9a8878;
  --pos:#2d7a3e; --neg:#c0392b; --user-bg:#e8e0d5;
  --chat-bg:#f5f0eb;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── 시작 페이지 ── */
#start-page{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;padding:20px;
  transition:opacity 0.4s ease;
}
#start-page.hidden{opacity:0;pointer-events:none;}
.start-logo{font-size:32px;margin-bottom:4px;}
.start-title{font-size:28px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-0.5px;}
.start-sub{font-size:14px;color:var(--text-dim);margin-bottom:40px;}
.start-input-wrap{
  width:100%;max-width:620px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;padding:14px 18px;
  display:flex;flex-direction:column;gap:12px;
  box-shadow:0 2px 20px rgba(0,0,0,0.06);
  transition:border-color 0.2s;
}
.start-input-wrap:focus-within{border-color:var(--accent);}
#start-input{
  width:100%;background:transparent;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);
  min-height:28px;resize:none;line-height:1.5;
}
#start-input::placeholder{color:var(--text-dim);}
.start-input-footer{display:flex;align-items:center;justify-content:space-between;}
.start-send-btn{
  width:34px;height:34px;background:var(--accent);border:none;
  border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity 0.15s;
}
.start-send-btn:hover{opacity:0.85;}
.start-send-btn svg{width:15px;height:15px;fill:white;}
.start-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:24px;max-width:620px;}
.start-chip{
  padding:8px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;font-size:13px;color:var(--text-dim);cursor:pointer;
  transition:all 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.start-chip:hover{border-color:var(--accent);color:var(--accent);}

/* ── 채팅 페이지 ── */
#chat-page{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 0.4s ease;}
#chat-page.visible{opacity:1;}

header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.logo-box{
  width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
.header-info h1{font-size:15px;font-weight:700;color:var(--text);}
.header-info p{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.status{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);}
.dot{width:6px;height:6px;border-radius:50%;background:#2d7a3e;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

#chat{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:14px;
  background:var(--chat-bg);scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.msg{display:flex;gap:8px;animation:up 0.25s ease;max-width:85%;}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:75%;}
.msg.ai{align-self:flex-start;}
.msg.full{max-width:100%;width:100%;}
.av{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;
}
.msg.user .av{background:var(--accent);color:white;}
.msg.ai .av{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);}
.bubble{
  padding:10px 14px;border-radius:14px;font-size:14px;
  line-height:1.65;word-break:break-word;white-space:pre-wrap;
}
.msg.user .bubble{background:var(--accent);color:white;border-top-right-radius:3px;font-weight:500;}
.msg.ai .bubble{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:3px;color:var(--text);}

/* 상황판 */
.board{background:var(--surface2);border:1px solid var(--border);border-radius:14px;border-top-left-radius:3px;padding:16px;width:100%;}
.board-title{font-size:12px;font-family:'DM Mono',monospace;color:var(--accent);margin-bottom:12px;font-weight:600;}
.board-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;flex-wrap:wrap;}
.board-label{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:600;min-width:90px;flex-shrink:0;padding-top:4px;}
.board-label.label-e{font-size:14px;font-weight:700;}
.board-options{display:flex;gap:6px;flex-wrap:wrap;}
.opt-btn{
  padding:5px 13px;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;font-size:12px;color:var(--text);cursor:pointer;transition:all 0.15s;
}
.opt-btn:hover{border-color:var(--accent);color:var(--accent);}
.opt-btn.selected{background:var(--accent);border-color:var(--accent);color:white;font-weight:600;}
.board-direct{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;
  font-family:'DM Sans',sans-serif;outline:none;margin-top:4px;
}
.board-direct:focus{border-color:var(--accent);}
.board-hint{font-size:12px;color:var(--text-dim);margin-top:6px;line-height:1.7;font-style:italic;}
.board-help{font-size:12px;color:var(--accent);margin-top:8px;font-weight:500;}
.board-confirm{
  margin-top:14px;padding:8px 22px;background:var(--accent);color:white;
  border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.15s;
}
.board-confirm:hover{opacity:0.85;}

/* 확인 버튼 */
.confirm-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:14px;border-top-left-radius:3px;padding:16px;width:100%;}
.confirm-text{font-size:14px;line-height:1.7;margin-bottom:14px;white-space:pre-wrap;color:var(--text);}
.confirm-btns{display:flex;gap:8px;flex-wrap:wrap;}
.confirm-btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
.btn-yes{background:var(--accent);color:white;}
.btn-yes:hover{opacity:0.85;}
.btn-add{background:var(--surface2);border:1.5px solid var(--accent);color:var(--accent);}
.btn-add:hover{background:var(--accent);color:white;}
.btn-no{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);}
.btn-no:hover{border-color:var(--neg);color:var(--neg);}

/* 제품 카드 */
.products-wrap{width:100%;display:flex;flex-direction:column;gap:10px;}
.products-title{font-size:13px;font-family:'DM Mono',monospace;color:var(--accent);padding:4px 0;font-weight:600;}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;gap:14px;transition:border-color 0.15s;}
.product-card:hover{border-color:var(--accent);}
.product-img{width:90px;height:90px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:36px;}
.product-img img{width:100%;height:100%;object-fit:contain;}
.product-info{flex:1;min-width:0;}
.product-store{font-size:11px;color:var(--accent);margin-bottom:4px;font-family:'DM Mono',monospace;}
.product-name{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.4;color:var(--text);}
.product-price{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:'DM Mono',monospace;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-pos{background:rgba(45,122,62,0.1);color:var(--pos);border:1px solid rgba(45,122,62,0.2);}
.badge-neg{background:rgba(192,57,43,0.1);color:var(--neg);border:1px solid rgba(192,57,43,0.2);}
.badge-score{background:rgba(212,118,59,0.1);color:var(--accent);border:1px solid rgba(212,118,59,0.2);}
.btn-view{display:inline-block;padding:6px 16px;background:var(--accent);color:white;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;}

/* 타이핑 */
.typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text-dim);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* 입력 */
.input-area{
  padding:12px 20px;border-top:1px solid var(--border);
  background:var(--surface);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
.input-wrap{
  flex:1;display:flex;align-items:center;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:12px;padding:8px 14px;transition:border-color 0.2s;
}
.input-wrap:focus-within{border-color:var(--accent);}
#input{
  flex:1;background:transparent;border:none;outline:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;resize:none;line-height:1.5;max-height:100px;min-height:22px;
}
#input::placeholder{color:var(--text-dim);}
#sendBtn{
  width:36px;height:36px;background:var(--accent);border:none;border-radius:10px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity 0.15s;
}
#sendBtn:hover{opacity:0.85;}
#sendBtn:disabled{opacity:0.3;cursor:not-allowed;}
#sendBtn svg{width:15px;height:15px;fill:white;}
</style>
</head>
<body>

<!-- 시작 페이지 -->
<div id="start-page">
  <div class="start-logo">🛍️</div>
  <h1 class="start-title">Decision Engine</h1>
  <p class="start-sub">리뷰 역추적으로 최적의 제품을 찾아드려요</p>
  <div class="start-input-wrap">
    <textarea id="start-input" placeholder="찾으시는 제품을 입력해주세요..." rows="1"></textarea>
    <div class="start-input-footer">
      <span style="font-size:12px;color:var(--text-dim);">AI Review Reverse Engine</span>
      <button class="start-send-btn" onclick="startChat()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <div class="start-chips">
    <div class="start-chip" onclick="startWithChip('아기 독서대 찾아요')">📚 아기 독서대</div>
    <div class="start-chip" onclick="startWithChip('여행용 가방 찾아요')">👜 여행용 가방</div>
    <div class="start-chip" onclick="startWithChip('발열 없는 노트북')">💻 발열 없는 노트북</div>
    <div class="start-chip" onclick="startWithChip('아기 카시트 찾아요')">🚗 아기 카시트</div>
    <div class="start-chip" onclick="startWithChip('baby book stand')">🇺🇸 baby book stand</div>
  </div>
</div>

<!-- 채팅 페이지 -->
<div id="chat-page">
  <header>
    <div class="logo-box">DE</div>
    <div class="header-info">
      <h1>Decision Engine</h1>
      <p>AI Review Reverse Engine</p>
    </div>
    <div class="status"><div class="dot"></div><span>v3 live</span></div>
  </header>
  <div id="chat"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
    </div>
    <button id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const chatPage  = document.getElementById('chat-page');
const startPage = document.getElementById('start-page');
const chat      = document.getElementById('chat');
const input     = document.getElementById('input');
const sendBtn   = document.getElementById('sendBtn');
const startInput = document.getElementById('start-input');
let session = null;
const EMOJIS = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];

// 시작 페이지 자동 높이
startInput.addEventListener('input', () => {
  startInput.style.height = 'auto';
  startInput.style.height = Math.min(startInput.scrollHeight, 120) + 'px';
});
startInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startChat(); }
});

function showChatPage() {
  startPage.classList.add('hidden');
  chatPage.classList.add('visible');
  setTimeout(() => { startPage.style.display = 'none'; }, 400);
}

function startChat() {
  const text = startInput.value.trim();
  if (!text) return;
  showChatPage();
  setTimeout(() => send(text), 100);
}

function startWithChip(text) {
  showChatPage();
  setTimeout(() => send(text), 100);
}

// 채팅 입력 높이
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function scroll() { chat.scrollTop = chat.scrollHeight; }

function addUserMsg(text) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `<div class="av">나</div><div class="bubble">${text}</div>`;
  chat.appendChild(msg); scroll();
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg ai'; msg.id = 'typing';
  msg.innerHTML = `<div class="av">DE</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(msg); scroll();
}

function isBoard(text) {
  return text.includes('[A ') && text.includes('[D 예산') && text.includes('[E 직접입력]');
}

function renderBoard(fullText) {
  const boardStart = fullText.indexOf('[A ');
  const empathy = boardStart > 0 ? fullText.substring(0, boardStart).trim() : '';
  const boardText = boardStart > 0 ? fullText.substring(boardStart) : fullText;

  if (empathy) {
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.innerHTML = `<div class="av">DE</div><div class="bubble">${empathy}</div>`;
    chat.appendChild(msg);
  }

  const lines = boardText.split('\n').filter(l => l.trim());
  const wrap = document.createElement('div');
  wrap.className = 'msg ai full';
  const av = document.createElement('div');
  av.className = 'av'; av.textContent = 'DE';
  const board = document.createElement('div');
  board.className = 'board';
  const title = document.createElement('div');
  title.className = 'board-title';
  title.textContent = '▸ 조건을 선택해주세요';
  board.appendChild(title);

  const selections = {};
  let directInput = null;

  lines.forEach(line => {
    const match = line.match(/\[([A-E][^\]]*)\]\s*(.*)/);
    if (!match) return;
    const label = match[1].trim();
    const content = match[2].trim();
    const key = label[0];

    const row = document.createElement('div');
    row.className = 'board-row';
    const lbl = document.createElement('div');
    lbl.className = key === 'E' ? 'board-label label-e' : 'board-label';
    lbl.textContent = `[${label}]`;
    row.appendChild(lbl);

    if (key === 'E') {
      const inp = document.createElement('input');
      inp.className = 'board-direct';
      inp.placeholder = '직접 입력하세요...';
      inp.type = 'text';
      directInput = inp;
      row.appendChild(inp);
      board.appendChild(row);

      const help = document.createElement('div');
      help.className = 'board-help';
      help.textContent = '✍️ 여기에 적어주신 한 마디가 더 정확한 제품을 찾는데 도움이 됩니다';
      board.appendChild(help);
    } else {
      const opts = document.createElement('div');
      opts.className = 'board-options';
      content.split('/').map(o => o.trim()).filter(Boolean).forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'opt-btn';
        btn.textContent = opt;
        btn.onclick = () => {
          opts.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selections[key] = opt;
        };
        opts.appendChild(btn);
      });
      row.appendChild(opts);
      board.appendChild(row);
    }
  });

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'board-confirm';
  confirmBtn.textContent = '선택 완료 →';
  confirmBtn.onclick = () => {
    const parts = [];
    ['A','B','C','D'].forEach(k => { if (selections[k]) parts.push(`${k}:${selections[k]}`); });
    if (directInput && directInput.value.trim()) parts.push(`E:${directInput.value.trim()}`);
    if (parts.length === 0) { alert('조건을 하나 이상 선택해주세요'); return; }
    send(parts.join(' '));
  };
  board.appendChild(confirmBtn);
  wrap.appendChild(av); wrap.appendChild(board);
  chat.appendChild(wrap);
}

function isConfirm(text) { return text.includes('CONFIRM_BUTTONS'); }

function renderConfirm(text) {
  const summaryText = text.replace('CONFIRM_BUTTONS', '').trim();
  const wrap = document.createElement('div');
  wrap.className = 'msg ai full';
  const av = document.createElement('div');
  av.className = 'av'; av.textContent = 'DE';
  const box = document.createElement('div');
  box.className = 'confirm-wrap';
  const txt = document.createElement('div');
  txt.className = 'confirm-text';
  txt.textContent = summaryText;
  box.appendChild(txt);
  const btns = document.createElement('div');
  btns.className = 'confirm-btns';
  const yes = document.createElement('button');
  yes.className = 'confirm-btn btn-yes';
  yes.textContent = '네, 찾아주세요! 🔍';
  yes.onclick = () => send('네');
  const add = document.createElement('button');
  add.className = 'confirm-btn btn-add';
  add.textContent = '추가할게요 ✏️';
  add.onclick = () => send('추가');
  const no = document.createElement('button');
  no.className = 'confirm-btn btn-no';
  no.textContent = '다시 선택할게요';
  no.onclick = () => send('아니요');
  btns.appendChild(yes); btns.appendChild(add); btns.appendChild(no);
  box.appendChild(btns);
  wrap.appendChild(av); wrap.appendChild(box);
  return wrap;
}

function parseProducts(text) {
  const lines = text.split('\n');
  const products = [];
  let cur = null;
  for (const line of lines) {
    const tm = line.match(/^(\d+)\. (.+)/);
    if (tm) {
      if (cur) products.push(cur);
      cur = { rank:parseInt(tm[1]), title:tm[2].trim(), price:'', store:'', positive:'0', negative:'0', score:'0', link:'', image_url:'' };
      continue;
    }
    if (!cur) continue;
    const price = line.match(/가격[:\s]+([0-9,]+원?)/);
    if (price) cur.price = price[1];
    const store = line.match(/[Ss]tore[:\s]+(.+)/);
    if (store) cur.store = store[1].trim();
    const lnk = line.match(/(?:🔗\s*)?[Ll]ink[:\s]+(.+)/);
    if (lnk) cur.link = lnk[1].trim();
  }
  if (cur) products.push(cur);
  return products;
}

function renderProducts(products) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai full';
  const av = document.createElement('div');
  av.className = 'av'; av.textContent = 'DE';
  const pw = document.createElement('div');
  pw.className = 'products-wrap';
  const title = document.createElement('div');
  title.className = 'products-title';
  title.textContent = '🏆 리뷰 역추적 Top 3';
  pw.appendChild(title);
  products.slice(0,3).forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    const imgBox = document.createElement('div');
    imgBox.className = 'product-img';
    imgBox.onclick = () => { if (p.link && p.link !== '#') window.open(p.link,'_blank'); };
    imgBox.textContent = EMOJIS[i]||'📦';
    const info = document.createElement('div');
    info.className = 'product-info';
    info.innerHTML = `
      <div class="product-store">${p.store||'추천'}</div>
      <div class="product-name">${p.title}</div>
      ${p.price ? `<div class="product-price">${p.price}</div>` : ''}
      <div class="badges">
        <span class="badge badge-pos">👍 ${p.positive}</span>
        <span class="badge badge-neg">👎 ${p.negative}</span>
        <span class="badge badge-score">⭐ ${p.score}</span>
      </div>
      <a href="${p.link||'#'}" target="_blank" class="btn-view">자세히 보기 →</a>
    `;
    card.appendChild(imgBox); card.appendChild(info);
    pw.appendChild(card);
  });
  wrap.appendChild(av); wrap.appendChild(pw);
  return wrap;
}

function addAiMsg(text) {
  if (isConfirm(text)) {
    chat.appendChild(renderConfirm(text));
  } else if (isBoard(text)) {
    renderBoard(text);
  } else {
    const prods = parseProducts(text);
    if (prods.length > 0 && text.match(/^\d+\./m)) {
      chat.appendChild(renderProducts(prods));
    } else {
      const msg = document.createElement('div');
      msg.className = 'msg ai';
      msg.innerHTML = `<div class="av">DE</div><div class="bubble">${text}</div>`;
      chat.appendChild(msg);
    }
  }
  scroll();
}

async function send(overrideText) {
  const msg = overrideText || input.value.trim();
  if (!msg) return;
  addUserMsg(msg);
  if (!overrideText) { input.value = ''; input.style.height = 'auto'; }
  sendBtn.disabled = true;
  addTyping();
  try {
    const res = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg, session: session })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();
    session = data.session;
    addAiMsg(data.response || '');
  } catch(e) {
    document.getElementById('typing')?.remove();
    addAiMsg('연결 오류가 발생했어요. 다시 시도해주세요.');
  }
  sendBtn.disabled = false;
  input.focus();
}

function quickSend(text) { send(text); }
</script>
</body>
</html>
