<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Picko</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 마이크 파동 모달 -->
<div id="micModal">
  <div class="mic-wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="mic-text">🎤 말씀해주세요...</div>
  <div class="mic-interim" id="micInterim"></div>
</div>

<!-- 시작 페이지 -->
<div id="start-page">
  <div class="start-logo">🛍️</div>
  <h1 class="start-title">Picko</h1>
  <p class="start-sub">리뷰 역추적으로 최적의 제품을 찾아드려요</p>
  <div class="start-input-wrap">
    <textarea id="start-input" placeholder="찾으시는 제품을 입력해주세요..." rows="1"></textarea>
    <div class="start-input-footer">
      <span style="font-size:12px;color:var(--text-dim);">AI Review Reverse Engine</span>
      <div style="display:flex;gap:6px;">
        <button id="startMicBtn" onclick="toggleStartVoice()" style="width:34px;height:34px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:var(--text-dim);"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 19.93c-3.95-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.05 7.44-7 7.93V23h-2v-2.07z"/></svg>
        </button>
        <button class="start-send-btn" onclick="startChat()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="start-chips">
    <div class="start-chip" onclick="startWithChip('아기 독서대 찾아요')">📚 아기 독서대</div>
    <div class="start-chip" onclick="startWithChip('여행용 가방 찾아요')">👜 여행용 가방</div>
    <div class="start-chip" onclick="startWithChip('발열 없는 노트북')">💻 발열 없는 노트북</div>
    <div class="start-chip" onclick="startWithChip('아기 카시트 찾아요')">🚗 아기 카시트</div>
    <div class="start-chip" onclick="startWithChip('baby book stand')">🇺🇸 baby book stand</div>
  </div>
</div>

<!-- 채팅 페이지 -->
<div id="chat-page">
  <header>
    <div class="header-inner">
      <div class="logo-wrap">
        <span class="logo-emoji">🛍️</span>
        <div class="header-info">
          <h1>Picko</h1>
          <p>AI Review Reverse Engine</p>
        </div>
      </div>
      <div class="status"><div class="dot"></div><span id="versionTag">live</span></div>
      <button id="musicBtn" onclick="toggleMusic()" title="배경음악">🎵</button>
    </div>
  </header>

  <div id="chat"></div>

  <div class="input-area">
    <div class="input-inner">
      <div class="input-wrap">
        <textarea id="input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      </div>
      <button id="micBtn" onclick="toggleVoice()">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 19.93c-3.95-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.05 7.44-7 7.93V23h-2v-2.07z"/></svg>
      </button>
      <button id="sendBtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>

<!-- 배경음악 -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
</audio>

<script>
let musicPlaying = false;
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
bgMusic.volume = 0.08;

function toggleMusic() {
  if (musicPlaying) {
    bgMusic.pause();
    musicBtn.textContent = '🎵';
    musicBtn.style.opacity = '0.5';
    musicPlaying = false;
  } else {
    bgMusic.play().then(() => {
      musicBtn.textContent = '🔇';
      musicBtn.style.opacity = '1.0';
      musicPlaying = true;
    }).catch(() => {});
  }
}

// 시작 버튼/칩 클릭 시 자동 재생
function _autoPlayMusic() {
  if (!musicPlaying) {
    bgMusic.play().then(() => {
      musicBtn.textContent = '🔇';
      musicBtn.style.opacity = '1.0';
      musicPlaying = true;
    }).catch(() => {});
  }
}

document.querySelector('.start-send-btn')?.addEventListener('click', _autoPlayMusic);
document.querySelectorAll('.start-chip').forEach(c => c.addEventListener('click', _autoPlayMusic));
document.getElementById('startMicBtn')?.addEventListener('click', _autoPlayMusic);
</script>
</body>
</html>
